<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Boutique | Order Success</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --aura-theme: #F27D26;
            --aura-glow: rgba(242, 125, 38, 0.2);
            --aura-grad: radial-gradient(circle at 50% 50%, #F27D26 0%, #A34500 100%);
            --luxury-bg: #ffffff;
            --luxury-border: rgba(0, 0, 0, 0.08);
            --luxury-text: #111;
            --luxury-muted: #666;
        }

        body {
            background-color: var(--luxury-bg);
            color: var(--luxury-text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .success-card {
            background: white;
            border: 1px solid var(--luxury-border);
            border-radius: 24px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.05);
            padding: 80px 40px;
            max-width: 600px;
            width: 90%;
            position: relative;
            overflow: hidden;
            animation: cardReveal 1.2s cubic-bezier(0.23, 1, 0.32, 1) both;
        }

        @keyframes cardReveal {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .success-icon {
            width: 100px;
            height: 100px;
            background: var(--aura-grad);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 40px;
            color: white;
            font-size: 40px;
            box-shadow: 0 20px 40px var(--aura-glow);
            animation: pulseIcon 2s infinite ease-in-out;
        }

        @keyframes pulseIcon {
            0% {
                transform: scale(1);
                box-shadow: 0 20px 40px var(--aura-glow);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 25px 50px rgba(242, 125, 38, 0.4);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 20px 40px var(--aura-glow);
            }
        }

        .order-id {
            background: #f8f8f8;
            padding: 12px 24px;
            border-radius: 99px;
            font-family: 'Inter';
            font-weight: 800;
            font-size: 13px;
            letter-spacing: 0.1em;
            display: inline-block;
            margin-top: 20px;
            color: var(--luxury-muted);
        }

        .btn-return {
            display: inline-block;
            background: #000;
            color: white;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-top: 40px;
            text-decoration: none;
            transition: all 0.4s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .btn-return:hover {
            background: var(--aura-theme);
            transform: translateY(-5px);
            box-shadow: 0 15px 40px var(--aura-glow);
        }

        .abstract-bg {
            position: absolute;
            top: -20%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: var(--aura-glow);
            filter: blur(80px);
            z-index: -1;
            border-radius: 50%;
        }
    </style>
</head>

<body>
    <div class="success-card">
        <div class="abstract-bg"></div>
        <div class="success-icon">✓</div>

        <span class="text-sm font-bold tracking-[0.4em] uppercase opacity-40 mb-4 block">Order Confirmed</span>
        <h1 class="font-serif italic text-5xl md:text-6xl mb-6">Thank You.</h1>
        <p class="text-lg opacity-60 leading-relaxed px-10">
            We've received your order and our boutique artisans are already preparing your luxury selects.
        </p>

        <div class="order-id">
            ORDER ID: <span id="display-order-id">#AURA-REF-000</span>
        </div>

        <div class="mt-12 space-y-6">
            <a href="shop.html" class="btn-return">Continue Shopping</a>
            <br>
            <a href="account.html"
                class="text-sm font-bold opacity-30 hover:opacity-100 transition-opacity uppercase tracking-widest">View
                Orders in Account</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('order');
        if (orderId) {
            document.getElementById('display-order-id').innerText = '#' + orderId.substring(0, 8).toUpperCase();
        }
    </script>
</body>

</html>
