<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop — AURA Premium</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --aura-theme: #F27D26;
            --aura-bg: #0a0a0a;
        }

        body {
            background-color: #fbfbfb;
            color: #1a1a1a;
        }

        .shop-header {
            padding: 180px 5% 100px;
            position: relative;
            overflow: hidden;
            background: transparent;
            color: white;
            text-align: center;
        }

        .bg-transition {
            transition: background 1s ease-in-out, background-color 1.5s ease;
        }

        .shop-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 5% 120px;
        }

        /* --- Sidebar Enhanced Filters --- */
        .sidebar-section {
            margin-bottom: 40px;
        }

        .product-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.03);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.08);
            border-color: rgba(0,0,0,0.08);
        }

        .card-image-wrap {
            position: relative;
            aspect-ratio: 4/5;
            overflow: hidden;
            background: #f8f8f8;
            margin-bottom: 0;
            display: flex;
            align-items: flex-end;
        }

        .card-image-wrap img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .product-card:hover .card-image-wrap img {
            transform: scale(1.05);
        }

        .quick-add-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            opacity: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: black;
            padding: 14px 28px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            white-space: nowrap;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .product-card:hover .quick-add-btn {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .quick-add-btn:hover {
            background: var(--aura-theme);
            color: white;
            transform: translateX(-50%) translateY(-2px) scale(1.03);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .card-info {
            padding: 24px;
            text-align: center;
        }

        .card-tag {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--aura-theme);
            font-weight: 700;
            margin-bottom: 8px;
            display: block;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .card-price {
            font-size: 16px;
            color: #666;
            font-weight: 600;
        }

        /* Updated Premium Wishlist & Badges */
        [data-commerce="wishlist-toggle"], .wishlist-toggle-btn {
            position: absolute !important;
            top: 15px !important;
            left: 15px !important;
            width: 42px !important;
            height: 42px !important;
            border-radius: 50% !important;
            background: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            cursor: pointer !important;
            z-index: 20 !important;
            opacity: 0 !important;
            transform: scale(0.8) !important;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
            color: #1a1a1a !important;
            padding: 0 !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05) !important;
        }

        .product-card:hover [data-commerce="wishlist-toggle"],
        .product-card:hover .wishlist-toggle-btn {
            opacity: 1 !important;
            transform: scale(1) !important;
        }

        [data-commerce="wishlist-toggle"]:hover, .wishlist-toggle-btn:hover {
            background: #fff !important;
            transform: scale(1.1) !important;
            color: #ff3b30 !important;
            box-shadow: 0 8px 25px rgba(255, 59, 48, 0.2) !important;
        }

        .wfc-wishlisted {
            color: #ff3b30 !important;
            background: #fff !important;
            opacity: 1 !important;
            transform: scale(1) !important;
        }

        .wfc-wishlisted svg path {
            fill: currentColor !important;
        }

        .card-badge-wrap {
            position: absolute !important;
            top: 15px !important;
            right: 0 !important;
            left: auto !important;
            z-index: 10 !important;
            pointer-events: none !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: flex-end !important;
        }

        .wfc-badge-featured {
            background: rgba(26, 26, 26, 0.9) !important;
            backdrop-filter: blur(8px);
            color: #fff !important;
            padding: 6px 16px !important;
            font-size: 10px !important;
            text-transform: uppercase !important;
            letter-spacing: 2px !important;
            font-weight: 800 !important;
            border-radius: 4px 0 0 4px !important;
            box-shadow: -5px 5px 15px rgba(0, 0, 0, 0.15);
            border-left: 2px solid var(--aura-theme);
        }
        /* End of premium overrides */
    </style>
</head>

<body>
    <!-- Global Header -->
    <div id="header-placeholder"></div>

    <header class="shop-header">
        <!-- Dynamic Background Gradient -->
        <div id="dynamic-bg" class="absolute inset-0 z-0 bg-transition" style="background: var(--aura-grad);"></div>

        <div class="relative z-10">
            <h1 class="text-6xl md:text-8xl font-serif italic mb-6">The Collection</h1>
            <p class="text-lg opacity-80 max-w-2xl mx-auto font-light">Explore our full range of premium technical outerwear, designed for those who demand excellence in every environment.</p>
        </div>
    </header>    <div class="shop-container">
        <!-- Top Category Tabs (Centered) -->
        <div class="shop-filters-top">
            <div class="category-tabs">
                <button class="tab-btn active" onclick="filterShop('all', this)">All Collections</button>
                <button class="tab-btn" onclick="filterShop('outerwear', this)">Outerwear</button>
                <button class="tab-btn" onclick="filterShop('accessories', this)">Accessories</button>
                <button class="tab-btn" onclick="filterShop('essentials', this)">Essentials</button>
            </div>
        </div>

        <div class="shop-layout-wrapper">
            <aside class="shop-sidebar" data-enabled-filters="all">
                <div class="sidebar-section" data-filter-group="price">
                    <span class="sidebar-title">Price Range</span>
                    <div class="price-filter-wrap">
                        <div class="price-input-group">
                            <label>MIN</label>
                            <input type="number" id="min-price" placeholder="0" onchange="applySidebarFilters()">
                        </div>
                        <div class="price-separator"></div>
                        <div class="price-input-group">
                            <label>MAX</label>
                            <input type="number" id="max-price" placeholder="999+" onchange="applySidebarFilters()">
                        </div>
                    </div>
                </div>

                <div class="sidebar-section" data-filter-group="sort">
                    <span class="sidebar-title">Sort By</span>
                    <div class="sort-options">
                        <label class="sort-radio">
                            <input type="radio" name="shop-sort" value="newest" checked onchange="applySidebarFilters()">
                            <span>New Arrivals</span>
                        </label>
                        <label class="sort-radio">
                            <input type="radio" name="shop-sort" value="price-low" onchange="applySidebarFilters()">
                            <span>Price: Low to High</span>
                        </label>
                        <label class="sort-radio">
                            <input type="radio" name="shop-sort" value="price-high" onchange="applySidebarFilters()">
                            <span>Price: High to Low</span>
                        </label>
                        <label class="sort-radio">
                            <input type="radio" name="shop-sort" value="name" onchange="applySidebarFilters()">
                            <span>Name: A-Z</span>
                        </label>
                    </div>
                </div>

                <div class="sidebar-section" data-filter-group="color">
                    <span class="sidebar-title">Color</span>
                    <div class="filter-options-grid" id="color-filters">
                        <div class="color-swatch" style="background: #000000" data-value="Black" title="Black" onclick="toggleAttributeFilter(this, 'color')"></div>
                        <div class="color-swatch" style="background: #ffffff; border: 1px solid #ddd" data-value="White" title="White" onclick="toggleAttributeFilter(this, 'color')"></div>
                        <div class="color-swatch" style="background: #7B61FF" data-value="Royal Purple" title="Royal Purple" onclick="toggleAttributeFilter(this, 'color')"></div>
                        <div class="color-swatch" style="background: #F27D26" data-value="Bright Orange" title="Bright Orange" onclick="toggleAttributeFilter(this, 'color')"></div>
                        <div class="color-swatch" style="background: #5A5A40" data-value="Olive Green" title="Olive Green" onclick="toggleAttributeFilter(this, 'color')"></div>
                        <div class="color-swatch" style="background: #E53E3E" data-value="Red" title="Red" onclick="toggleAttributeFilter(this, 'color')"></div>
                        <div class="color-swatch" style="background: #3182CE" data-value="Blue" title="Blue" onclick="toggleAttributeFilter(this, 'color')"></div>
                    </div>
                </div>

                <div class="sidebar-section" data-filter-group="size">
                    <span class="sidebar-title">Size</span>
                    <div class="filter-options-grid" id="size-filters">
                        <div class="size-pill-filter" data-value="S" onclick="toggleAttributeFilter(this, 'size')">S</div>
                        <div class="size-pill-filter" data-value="M" onclick="toggleAttributeFilter(this, 'size')">M</div>
                        <div class="size-pill-filter" data-value="L" onclick="toggleAttributeFilter(this, 'size')">L</div>
                        <div class="size-pill-filter" data-value="10" onclick="toggleAttributeFilter(this, 'size')">10</div>
                    </div>
                </div>

                <div class="sidebar-section" data-filter-group="availability">
                    <span class="sidebar-title">Availability</span>
                    <div class="availability-filters">
                        <label class="filter-check-label">
                            <input type="checkbox" id="filter-stock" onchange="applySidebarFilters()">
                            <span>In Stock Only</span>
                        </label>
                        <label class="filter-check-label">
                            <input type="checkbox" id="filter-sale" onchange="applySidebarFilters()">
                            <span>On Sale</span>
                        </label>
                    </div>
                </div>

                <button class="clear-filters-btn" onclick="clearFilters()">Reset Filters</button>
            </aside>


            <div class="shop-main-content">

        <div class="shop-grid" data-commerce="product-list" data-limit="18">
            <template data-commerce="product-template">
                <div class="product-card" data-commerce="product-item" data-product-id="{{id}}" data-category="{{categorySlug}}">
                    <div class="card-badge-wrap" data-field="badge"></div>
                    <button class="wishlist-toggle-btn" data-commerce="wishlist-toggle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.78-8.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                    </button>
                    <div class="card-image-wrap">
                        <a href="product.html?slug={{slug}}" class="product-card-link" data-field="link">
                            <img src="{{imageUrl}}" alt="{{title}}" data-field="image">
                        </a>
                        <button class="quick-add-btn" data-commerce="add-to-cart">
                            <span>Quick Add</span>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                    </div>
                    <div class="card-info">
                        <span class="card-tag">AURA PREMIUM</span>
                        <a href="product.html?slug={{slug}}" class="card-title-link" data-field="link">
                            <h3 class="card-title" data-field="title">{{title}}</h3>
                        </a>
                        <div class="card-price" data-field="price">
                            <span class="price-current">{{currency}}{{price}}</span>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>
</div>
</div>

    <div id="footer-placeholder"></div>
    <script src="global.js"></script>

    <script id="ce-engine-script" src="../sdk/engine_v5_final.js" data-api-url="http://127.0.0.1:5001" data-store-key="pk_live_6bf90196f1ba428e8f1ff44fa3d506df"></script>
    <script>
        (function() {
            const THEMES = {
                orange: { hex: '#F27D26', grad: 'radial-gradient(circle at 50% 50%, #F27D26 0%, #A34500 100%)' },
                olive:  { hex: '#5A5A40', grad: 'radial-gradient(circle at 50% 50%, #5A5A40 0%, #2A2A1A 100%)' },
                purple: { hex: '#7B61FF', grad: 'radial-gradient(circle at 50% 50%, #7B61FF 0%, #3B217F 100%)' }
            };

            function updateTheme(colorKey) {
                if (!THEMES[colorKey]) return;
                const theme = THEMES[colorKey];
                document.documentElement.style.setProperty('--aura-theme', theme.hex);
                document.documentElement.style.setProperty('--aura-grad', theme.grad);
                const dynamicBg = document.getElementById('dynamic-bg');
                if (dynamicBg) dynamicBg.style.background = theme.grad;
                localStorage.setItem('aura_active_theme_key', colorKey);
            }

            // Init theme
            try {
                const savedTheme = localStorage.getItem('aura_active_theme_key');
                if (savedTheme) updateTheme(savedTheme);
            } catch (e) {
                console.warn('LocalStorage blocked:', e);
            }

            // Initial Stagger Animation - Handled by global styles or omitted if preferred
            document.addEventListener('wfc:products-loaded', () => {
                // Re-init simple reveal or just let transition handle it
            });
        })();
    </script>
</body>

</html>
