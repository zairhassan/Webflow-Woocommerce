<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Puffer Series — AURA Premium</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --aura-theme: #F27D26;
            --aura-bg: #0a0a0a;
        }

        body {
            background-color: white; /* Changed to white as per user request */
            color: #1a1a1a;
            font-family: 'Inter', sans-serif;
        }

        .shop-header {
            padding: 180px 5% 100px;
            position: relative;
            overflow: hidden;
            background: var(--aura-bg);
            text-align: center;
            color: white; /* Hero text remains white */
        }

        .bg-transition {
            transition: background 1s ease-in-out, background-color 1.5s ease;
        }

        .shop-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 5%;
        }        /* Unique Masonry Grid for Puffer Series - simplified */
        .outerwear-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 60px;
            align-items: start;
        }

        .product-card {
            background: #fdfdfd;
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        .card-image-wrap {
            aspect-ratio: 3/4;
            overflow: hidden;
            background: #f5f5f5;
        }

        .card-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .product-card:hover {
            transform: translateY(-15px);
            border-color: var(--aura-theme);
            box-shadow: 0 40px 80px rgba(0,0,0,0.08);
        }

        .product-card:hover .card-image-wrap img {
            transform: scale(1.1);
        }

        .card-info {
            padding: 40px;
        }

        .card-tag {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--aura-theme);
            font-weight: 800;
            margin-bottom: 12px;
            display: block;
        }

        .card-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            font-family: 'serif';
            font-style: italic;
        }

        .card-price {
            font-size: 20px;
            font-weight: 600;
            color: #666;
        }

        [data-commerce="wishlist-toggle"] {
            position: absolute !important;
            top: 15px !important;
            left: 15px !important;
            width: 44px !important;
            height: 44px !important;
            border-radius: 50% !important;
            background: rgba(255, 255, 255, 0.9) !important;
            backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(0, 0, 0, 0.05) !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            cursor: pointer !important;
            z-index: 20;
            transition: all 0.4s !important;
            color: #1a1a1a !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05) !important;
        }

        [data-commerce="wishlist-toggle"]:hover {
            transform: scale(1.1);
        }

        [data-commerce="wishlist-toggle"].wfc-wishlisted,
        .wishlist-toggle-btn.wfc-wishlisted {
            border-color: #ff3b30 !important;
            color: #ff3b30 !important;
            background: rgba(255, 59, 48, 0.05) !important;
        }

        .card-badge-wrap {
            position: absolute !important;
            top: 15px !important;
            right: 0 !important;
            left: auto !important;
            z-index: 25 !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: flex-end !important;
        }
        [data-commerce="wishlist-toggle"].wfc-wishlisted svg path,
        .wishlist-toggle-btn.wfc-wishlisted svg path {
            fill: none !important;
            stroke: currentColor !important;
        }

        .nav-link { font-size: 14px; font-weight: 500; transition: opacity 0.3s; color: white; }
        .nav-link:hover { opacity: 0.6; }
        .nav-active { font-weight: 800; border-bottom: 2px solid white; }

        @media (max-width: 991px) {
            .outerwear-grid { grid-template-columns: 1fr; gap: 40px; }
            .outerwear-grid .product-card:nth-child(even) { margin-top: 0; }
        }
    </style>
</head>
<body>
    <!-- Global Header -->
    <div id="header-placeholder"></div>

    <header class="shop-header">
        <div id="dynamic-bg" class="absolute inset-0 z-0 bg-transition" style="background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000000 100%)"></div>
        <div class="relative z-10">
            <span class="text-aura-theme text-sm font-bold tracking-[0.4em] uppercase mb-4 block">Vault Section 01</span>
            <h1 class="text-7xl md:text-9xl font-serif italic mb-6">The Puffer Series</h1>
            <p class="text-xl opacity-80 max-w-2xl mx-auto font-light">Engineered for the extreme. Discover the pinnacle of technical outerwear protection.</p>
        </div>
    </header>

    <div class="shop-container">
        <!-- Top Category Tabs (Centered) -->
        <div class="shop-filters-top">
            <div class="category-tabs">
                <a href="shop.html" class="tab-btn">All Collections</a>
                <a href="outerwear.html" class="tab-btn active">Outerwear</a>
                <a href="accessories.html" class="tab-btn">Accessories</a>
                <a href="essentials.html" class="tab-btn">Essentials</a>
            </div>
        </div>

        <div class="shop-layout-wrapper">
            <aside class="shop-sidebar" data-enabled-filters="all">
                <div class="sidebar-section" data-filter-group="price">
                    <span class="sidebar-title">Price Range</span>
                    <div class="price-filter-wrap">
                        <div class="price-input-group">
                            <label>MIN</label>
                            <input type="number" id="min-price" placeholder="0" onchange="applySidebarFilters()">
                        </div>
                        <div class="price-separator"></div>
                        <div class="price-input-group">
                            <label>MAX</label>
                            <input type="number" id="max-price" placeholder="999+" onchange="applySidebarFilters()">
                        </div>
                    </div>
                </div>

                <div class="sidebar-section" data-filter-group="sort">
                    <span class="sidebar-title">Sort By</span>
                    <div class="sort-options">
                        <label class="sort-radio">
                            <input type="radio" name="shop-sort" value="newest" checked onchange="applySidebarFilters()">
                            <span>New Arrivals</span>
                        </label>
                        <label class="sort-radio">
                            <input type="radio" name="shop-sort" value="price-low" onchange="applySidebarFilters()">
                            <span>Price: Low to High</span>
                        </label>
                        <label class="sort-radio">
                            <input type="radio" name="shop-sort" value="price-high" onchange="applySidebarFilters()">
                            <span>Price: High to Low</span>
                        </label>
                        <label class="sort-radio">
                            <input type="radio" name="shop-sort" value="name" onchange="applySidebarFilters()">
                            <span>Name: A-Z</span>
                        </label>
                    </div>
                </div>

                <div class="sidebar-section" data-filter-group="color">
                    <span class="sidebar-title">Color</span>
                    <div class="filter-options-grid" id="color-filters">
                        <div class="color-swatch" style="background: #000000" data-value="Black" title="Black" onclick="toggleAttributeFilter(this, 'color')"></div>
                        <div class="color-swatch" style="background: #ffffff; border: 1px solid #ddd" data-value="White" title="White" onclick="toggleAttributeFilter(this, 'color')"></div>
                        <div class="color-swatch" style="background: #7B61FF" data-value="Royal Purple" title="Royal Purple" onclick="toggleAttributeFilter(this, 'color')"></div>
                        <div class="color-swatch" style="background: #F27D26" data-value="Bright Orange" title="Bright Orange" onclick="toggleAttributeFilter(this, 'color')"></div>
                        <div class="color-swatch" style="background: #5A5A40" data-value="Olive Green" title="Olive Green" onclick="toggleAttributeFilter(this, 'color')"></div>
                        <div class="color-swatch" style="background: #E53E3E" data-value="Red" title="Red" onclick="toggleAttributeFilter(this, 'color')"></div>
                        <div class="color-swatch" style="background: #3182CE" data-value="Blue" title="Blue" onclick="toggleAttributeFilter(this, 'color')"></div>
                    </div>
                </div>

                <div class="sidebar-section" data-filter-group="size">
                    <span class="sidebar-title">Size</span>
                    <div class="filter-options-grid" id="size-filters">
                        <div class="size-pill-filter" data-value="S" onclick="toggleAttributeFilter(this, 'size')">S</div>
                        <div class="size-pill-filter" data-value="M" onclick="toggleAttributeFilter(this, 'size')">M</div>
                        <div class="size-pill-filter" data-value="L" onclick="toggleAttributeFilter(this, 'size')">L</div>
                        <div class="size-pill-filter" data-value="10" onclick="toggleAttributeFilter(this, 'size')">10</div>
                    </div>
                </div>

                <div class="sidebar-section" data-filter-group="availability">
                    <span class="sidebar-title">Availability</span>
                    <div class="availability-filters">
                        <label class="filter-check-label">
                            <input type="checkbox" id="filter-stock" onchange="applySidebarFilters()">
                            <span>In Stock Only</span>
                        </label>
                        <label class="filter-check-label">
                            <input type="checkbox" id="filter-sale" onchange="applySidebarFilters()">
                            <span>On Sale</span>
                        </label>
                    </div>
                </div>

                <button class="clear-filters-btn" onclick="clearFilters()">Reset Filters</button>
            </aside>

            <div class="shop-main-content">
                <div class="outerwear-grid" data-commerce="product-list" data-category="outerwear" data-limit="6">
                    <template data-commerce="product-template">
                        <div class="product-card" data-commerce="product-item" data-product-id="{{id}}">
                            <div class="card-badge-wrap" data-field="badge"></div>
                            <button class="wishlist-toggle-btn" data-commerce="wishlist-toggle">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.78-8.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                                </svg>
                            </button>
                            <div class="card-image-wrap">
                                <a href="product.html?slug={{slug}}" class="product-card-link" data-field="link">
                                    <img src="{{imageUrl}}" alt="{{title}}" data-field="image">
                                </a>
                                <button class="quick-add-btn" data-commerce="add-to-cart">
                                    <span>Quick Add</span>
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                        <line x1="12" y1="5" x2="12" y2="19"></line>
                                        <line x1="5" y1="12" x2="19" y2="12"></line>
                                    </svg>
                                </button>
                            </div>
                            <div class="card-info">
                                <span class="card-tag">AURA PREMIUM</span>
                                <a href="product.html?slug={{slug}}" class="card-title-link" data-field="link">
                                    <h3 class="card-title" data-field="title">{{title}}</h3>
                                </a>
                                <div class="card-price" data-field="price">
                                    <span class="price-current">{{currency}}{{price}}</span>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>
    <script src="global.js"></script>

    <script id="ce-engine-script" src="../sdk/engine_v5_final.js" data-api-url="http://127.0.0.1:5001" data-store-key="pk_live_6bf90196f1ba428e8f1ff44fa3d506df"></script>
    <script>
        // Theme synchronization logic
        (function() {
            const THEMES = {
                orange: { hex: '#F27D26', grad: 'radial-gradient(circle at 50% 50%, #F27D26 0%, #A34500 100%)' },
                olive: { hex: '#5A5A40', grad: 'radial-gradient(circle at 50% 50%, #5A5A40 0%, #2A2A1A 100%)' },
                purple: { hex: '#7B61FF', grad: 'radial-gradient(circle at 50% 50%, #7B61FF 0%, #3B217F 100%)' }
            };

            function updateTheme(colorKey) {
                if (!THEMES[colorKey]) return;
                const dynamicBg = document.getElementById('dynamic-bg');
                if (dynamicBg) dynamicBg.style.background = THEMES[colorKey].grad;
            }

            try {
                const savedTheme = localStorage.getItem('aura_active_theme_key');
                if (savedTheme) updateTheme(savedTheme);
            } catch (e) {}

            window.addEventListener('scroll', () => {
                const nav = document.getElementById('main-nav');
                if (window.scrollY > 50) {
                    nav.style.backgroundColor = 'rgba(0,0,0,0.8)';
                    nav.style.paddingTop = '1rem';
                    nav.style.paddingBottom = '1rem';
                    nav.style.backdropFilter = 'blur(20px)';
                } else {
                    nav.style.backgroundColor = 'transparent';
                    nav.style.paddingTop = '2rem';
                    nav.style.paddingBottom = '2rem';
                    nav.style.backdropFilter = 'none';
                }

            });

        })();
    </script>
</body>
</html>
